<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JadwalKuliah</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS Sendiri -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container mt-5">

        <!-- Judul -->
        <div class="text-center mb-4">
            <h1>📚 JadwalKuliah</h1>
            <p class="text-muted">Website Jadwal Kuliah Mahasiswa Istnuba</p>
            <h5 id="tanggal">
                Selasa, 21 Juli 2026
            </h5>
        </div>

        <!-- Tombol Hari -->
        <div class="text-center mb-4">
            <button class="btn btn-primary m-1" onclick="tampilJadwal('selasa')">Selasa</button>

            <button class="btn btn-primary m-1" onclick="tampilJadwal('rabu')">Rabu</button>

            <button class="btn btn-primary m-1" onclick="tampilJadwal('kamis')">Kamis</button>

        </div>

        <!-- Tempat Jadwal -->
        <div class="card shadow">

            <div class="card-header">
                <h4>Jadwal Hari Ini</h4>
            </div>

            <div class="card-body" id="jadwalContainer">

                <p>Pilih salah satu hari.</p>

            </div>

        </div>

    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
